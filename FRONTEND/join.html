<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwaraBharat | Request Access</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-void: #020617;
            --primary: #6366f1;
            --accent: #d946ef;
            --glass: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-void);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 80% 20%, rgba(217, 70, 239, .15), transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, .15), transparent 40%);
        }

        nav {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Grotesk';
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 2rem;
            display: flex;
            gap: 4rem;
            flex-wrap: wrap;
        }

        .left {
            flex: 1;
            min-width: 300px;
        }

        .right {
            flex: 1;
            min-width: 300px;
        }

        h1 {
            font-family: 'Space Grotesk';
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        p {
            color: #cbd5e1;
            line-height: 1.7;
            font-size: 1.05rem;
        }

        .card {
            margin-top: 2rem;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(20px);
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        input,
        select {
            width: 100%;
            padding: 0.9rem;
            margin-bottom: 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, .4);
            color: white;
            font-size: 0.95rem;
        }

        select option {
            background: #0f172a;
            color: #e2e8f0;
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Space Grotesk';
            font-size: 1rem;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        #status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #93c5fd;
            display: block;
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 10px;
            background: rgba(2, 6, 23, 0.45);
            padding: 0.75rem 0.85rem;
            min-height: 44px;
        }

        @media(max-width: 768px) {
            h1 {
                font-size: 2.3rem;
            }

            .container {
                gap: 2rem;
            }
        }
    </style>
    <link rel="stylesheet" href="css/glassmorphism.css">
</head>

<body>
    <div class="bg-glow"></div>

    <nav>
        <a href="index.html" class="logo">
            <i class="fas fa-fingerprint" style="color:var(--accent)"></i> SwaraBharat
        </a>
        <a href="index.html" style="color:#94a3b8; text-decoration:none;">Close ✕</a>
    </nav>

    <div class="container">

        <div class="left">
            <h1>Request<br><span style="color:var(--accent)">Access</span></h1>
            <p>
                SwaraBharat is a civic intelligence grid.
                Governments, NGOs, and developers can request access to insights,
                integrations, or collaboration.
            </p>
        </div>

        <div class="right">
            <div class="card">
                <form id="accessForm">
                    <label>Entity Name</label>
                    <input id="entityName" type="text" required placeholder="Organization / Individual">

                    <label>Email</label>
                    <input id="entityEmail" type="email" required placeholder="contact@example.com">

                    <label>Access Type</label>
                    <select id="accessType">
                        <option value="government">Government Partner</option>
                        <option value="ngo">NGO / Social Organization</option>
                        <option value="medical">Medical Center Admin</option>
                        <option value="developer">Developer / Researcher</option>
                    </select>

                    <button id="submitBtn" type="submit">Submit Request</button>
                    <div id="status">Automation ready. Select Access Type to continue.</div>
                </form>
            </div>
        </div>

    </div>

    <script>
        const accessForm = document.getElementById("accessForm");
        const entityName = document.getElementById("entityName");
        const entityEmail = document.getElementById("entityEmail");
        const accessType = document.getElementById("accessType");
        const submitBtn = document.getElementById("submitBtn");
        const status = document.getElementById("status");

        const routeConfig = {
            government: {
                route: "admin/admin.html",
                button: "Open Government Dashboard",
                hint: "Automation: Government Partner routes to Admin Intelligence Panel.",
                color: "#93c5fd"
            },
            ngo: {
                route: "ngo.html",
                button: "Open NGO Volunteer Portal",
                hint: "Automation: NGO selection routes directly to NGO Volunteer Portal.",
                color: "#86efac"
            },
            medical: {
                route: "medical-center-admin.html",
                button: "Open Medical Center Panel",
                hint: "Automation: Medical selection routes to Medical Center Admin Panel.",
                color: "#fca5a5"
            },
            developer: {
                route: "ai-insights.html",
                button: "Open AI Insights Workspace",
                hint: "Automation: Developer selection routes to AI Insights page.",
                color: "#fcd34d"
            }
        };

        function updateAutomationUI() {
            const cfg = routeConfig[accessType.value] || routeConfig.government;
            submitBtn.textContent = cfg.button;
            status.textContent = cfg.hint;
            status.style.color = cfg.color;
        }

        function autoDetectAccessType() {
            const name = entityName.value.trim().toLowerCase();
            const email = entityEmail.value.trim().toLowerCase();

            if (!name && !email) {
                return;
            }

            if (email.endsWith(".gov.in") || email.endsWith(".gov") || name.includes("municipal") || name.includes("government")) {
                accessType.value = "government";
            } else if (name.includes("hospital") || name.includes("clinic") || name.includes("medical") || name.includes("health")) {
                accessType.value = "medical";
            } else if (name.includes("ngo") || name.includes("foundation") || name.includes("trust") || name.includes("charity")) {
                accessType.value = "ngo";
            } else if (name.includes("developer") || name.includes("research") || name.includes("lab") || email.includes("dev")) {
                accessType.value = "developer";
            }

            updateAutomationUI();
        }

        accessType.addEventListener("change", updateAutomationUI);
        entityName.addEventListener("input", autoDetectAccessType);
        entityEmail.addEventListener("input", autoDetectAccessType);

        accessForm.addEventListener("submit", function (e) {
            e.preventDefault();

            const name = entityName.value.trim().toLowerCase();
            const email = entityEmail.value.trim().toLowerCase();
            const cfg = routeConfig[accessType.value] || routeConfig.government;

            // Keep demo super-admin shortcut
            if (name === "divyanshu" && email === "divyanshu@gmail.com") {
                window.location.href = "admin/admin.html";
                return;
            }

            window.location.href = cfg.route;
        });

        updateAutomationUI();
    </script>

</body>

</html>
